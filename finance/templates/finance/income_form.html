{% extends "layouts/base.html" %}

{% block title %}Add Income{% endblock %}

{% block content %}
<div class="container">
    <h2>Add New Income</h2>
    <div class="card shadow mt-4">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-success">Save Income</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
