<div class="card stat-card h-100">

    <div class="card-body p-4">

        <div class="d-flex justify-content-between align-items-start">

            <!-- Left Content -->
            <div class="flex-grow-1">
                <small class="text-muted text-uppercase fw-medium">
                    {{ title }}
                </small>
                
                <h3 class="fw-bold mt-3 mb-1 text-3xl">
                    {{ value }}
                </h3>
                
                <small class="text-{{ subtitle_color|default:'muted' }}">
                    {{ subtitle }}
                </small>
            </div>

            <!-- Icon -->
            <div class="icon-circle bg-{{ color|default:'primary' }} text-white flex-shrink-0">
                <i class="bi {{ icon }}"></i>
            </div>

        </div>

    </div>

</div>
