{% extends "layouts/base.html" %}

{% block auth_content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-blue-950 p-4">

    <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md">

        <h2 class="text-3xl font-bold text-gray-900 mb-3">
            Reset Password
        </h2>

        <p class="text-gray-600 mb-6">
            Enter your email address and we will send you a password reset link.
        </p>


        <form method="post">

            {% csrf_token %}

            {{ form.email.label_tag }}

            {{ form.email }}


            <button type="submit"
                class="w-full mt-6 bg-blue-900 text-white py-3 rounded-xl font-semibold">
                Send Reset Link
            </button>

        </form>


        <div class="mt-6 text-center">

            <a href="{% url 'accounts:login' %}"
               class="text-blue-900">
                Back to Login
            </a>

        </div>

    </div>

</div>

{% endblock %}
