{% extends "layouts/base.html" %}

{% block auth_content %}

<div class="bg-white rounded-3xl shadow-xl p-8 w-full max-w-md">

<h2 class="text-3xl font-bold mb-6">
Create New Password

{% csrf_token %}

{{ form.as_p }}

Change Password
</button>


</form>

</div>
