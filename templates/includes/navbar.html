{% load static %}

<header class="top-navbar">

    <!-- LEFT SECTION -->
    <div class="navbar-left">

        <!-- Mobile Sidebar Toggle -->
        <button class="icon-btn sidebar-toggle" id="sidebarToggle" title="Toggle Menu">
            <i class="bi bi-list"></i>
        </button>

        <!-- Brand Logo -->
        <a href="{% url 'dashboard:dashboard' %}" class="brand-logo text-decoration-none">
            <img src="{% static 'img/logo.png' %}" alt="RLB-AM" class="logo-img">
            <div>
                <h5 class="mb-0">RLB-AM</h5>
                <small>CONSTRUCTION & REAL ESTATE LIMITED</small>
            </div>
        </a>

        <!-- Global Search -->
        <form class="global-search" id="globalSearchForm">
            <i class="bi bi-search"></i>
            <input type="search" 
                   id="globalSearchInput"
                   placeholder="Search equipment, rentals, employees, projects...">
            <span class="shortcut d-none d-xl-inline">Ctrl + K</span>
        </form>

    </div>

    <!-- RIGHT SECTION -->
    <div class="navbar-right">

        <!-- Date & Time -->
        <div class="navbar-datetime d-none d-md-flex flex-column align-items-end me-3">
            <small id="navbarDate" class="text-muted"></small>
            <strong id="navbarTime"></strong>
        </div>

        <!-- Notification -->
        <div class="dropdown">
            <button class="icon-btn position-relative" data-bs-toggle="dropdown" title="Notifications">
                <i class="bi bi-bell"></i>
                <span class="notification-dot"></span>
            </button>
            <div class="dropdown-menu dropdown-menu-end notification-menu">
                <!-- Notification items here -->
            </div>
        </div>

        <!-- User Profile -->
        <div class="dropdown">
            <button class="profile-button" data-bs-toggle="dropdown">
                <div class="navbar-avatar">
                    {% if request.user.profile_picture %}
                        <img src="{{ request.user.profile_picture.url }}" alt="{{ request.user.username }}">
                    {% else %}
                        <span>{{ request.user.username|slice:":1"|upper }}</span>
                    {% endif %}
                </div>
                <div class="d-none d-md-block text-start">
                    <strong>{{ request.user.get_full_name|default:request.user.username }}</strong>
                    <small class="text-muted d-block">
                        {% if request.user.role %}{{ request.user.role|title }}{% else %}Secretary{% endif %}
                    </small>
                </div>
            </button>

            <div class="dropdown-menu dropdown-menu-end profile-menu">
                <!-- Profile menu content -->
                <div class="dropdown-header">
                    <strong>{{ request.user.get_full_name|default:request.user.username }}</strong>
                </div>
                <a href="{% url 'accounts:profile' %}" class="dropdown-item">
                    <i class="bi bi-person-circle me-2"></i> My Profile
                </a>
                <a href="{% url 'logout' %}" class="dropdown-item text-danger">
                    <i class="bi bi-box-arrow-right me-2"></i> Logout
                </a>
            </div>
        </div>

    </div>

</header>
