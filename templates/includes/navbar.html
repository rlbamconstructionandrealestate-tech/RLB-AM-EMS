{% load static %}

<header class="top-navbar">


    <!-- LEFT -->

    <div class="navbar-left">


        <button
            class="icon-btn sidebar-toggle"
            id="sidebarToggle">

            <i class="bi bi-list"></i>

        </button>



        <form class="global-search">

            <i class="bi bi-search"></i>

            <input
                type="search"
                placeholder="Search equipment, projects, employees...">

        </form>


    </div>




    <!-- RIGHT -->

    <div class="navbar-right">



        <!-- DATE -->

        <div class="navbar-datetime d-none d-lg-flex">

            <small id="navbarDate"></small>

            <strong id="navbarTime"></strong>

        </div>





        <!-- NOTIFICATIONS -->

        <div class="dropdown">


            <button
                class="icon-btn position-relative"
                data-bs-toggle="dropdown">


                <i class="bi bi-bell"></i>

                <span class="notification-dot"></span>


            </button>



            <div class="dropdown-menu dropdown-menu-end shadow">


                <h6 class="dropdown-header">
                    Notifications
                </h6>


                <a class="dropdown-item">

                    <i class="bi bi-info-circle me-2"></i>
                    No new notifications

                </a>


            </div>


        </div>







        <!-- THEME -->

        <button
            class="icon-btn"
            id="themeToggle">

            <i class="bi bi-moon-stars"></i>

        </button>








        <!-- PROFILE -->

        <div class="dropdown">



            <button
                class="profile-button"
                data-bs-toggle="dropdown">


                <div class="navbar-avatar">


                    {% if request.user.profile_picture %}

                    <img
                    src="{{ request.user.profile_picture.url }}">


                    {% else %}

                    {{ request.user.username|slice:":1"|upper }}


                    {% endif %}


                </div>



                <div class="d-none d-md-block text-start">


                    <strong>

                    {{ request.user.get_full_name|default:request.user.username }}

                    </strong>



                    <small>

                    {{ request.user.get_role_display }}

                    </small>



                </div>



            </button>






            <div class="dropdown-menu dropdown-menu-end shadow profile-menu">


                <a href="{% url 'accounts:profile' %}"
                   class="dropdown-item">

                    <i class="bi bi-person me-2"></i>

                    Profile

                </a>



                <a href="#"
                   class="dropdown-item">

                    <i class="bi bi-gear me-2"></i>

                    Settings

                </a>



                <div class="dropdown-divider"></div>




                <form method="post"
                      action="{% url 'logout' %}">

                    {% csrf_token %}

                    <button
                        class="dropdown-item text-danger">


                        <i class="bi bi-box-arrow-right me-2"></i>

                        Logout


                    </button>


                </form>


            </div>


        </div>



    </div>


</header>
