<form method="get"
class="card p-3 mb-4">


<div class="row g-3">


<div class="col-md-6">


<input type="text"
name="search"
value="{{ request.GET.search }}"
class="form-control"
placeholder="Search equipment...">


</div>





<div class="col-md-4">


<select name="status"
class="form-select">


<option value="">
All Status
</option>


<option value="available">
Available
</option>


<option value="working">
Working
</option>


<option value="maintenance">
Maintenance
</option>


<option value="inactive">
Inactive
</option>


</select>


</div>





<div class="col-md-2">


<button class="btn btn-primary w-100">


<i class="bi bi-search me-1"></i>

Filter


</button>


</div>


</div>


</form>
